<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Yiğit Aydın</title>
    <meta name="description" content="Frontend Developer" />
    <meta name="author" content="Atlas Yiğit Aydın" />
    <meta name="robots" content="index, follow" />

    <!-- Theme color (light/dark) -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf9" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />

    <!-- Fallback Open Graph (Vue mount'tan önce tarayıcı/bot için) -->
    <meta property="og:site_name"   content="Atlas Yiğit Aydın" />
    <meta property="og:title"       content="Atlas Yiğit Aydın" />
    <meta property="og:description" content="Frontend Developer" />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://atlaxt.me/" />
    <meta property="og:locale"      content="tr_TR" />

    <!-- Fallback Twitter / X -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:site"        content="@atlaxt" />
    <meta name="twitter:creator"     content="@atlaxt" />
    <meta name="twitter:title"       content="Atlas Yiğit Aydın" />
    <meta name="twitter:description" content="Frontend Developer" />

    <!-- Canonical -->
    <link rel="canonical" href="https://atlaxt.me/" />

    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="Atlas Yiğit Aydın" href="https://atlaxt.me/rss.xml" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Alumni+Sans+Pinstripe&display=swap" rel="stylesheet" />

    <!-- Dark mode: flash olmadan doğru temayı uygula -->
    <script>
      ;(function () {
        const stored = localStorage.getItem('color-mode')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <!-- Highlight rough-edge SVG filter — site genelinde kullanılır -->
    <svg id="hl-svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none">
      <defs>
        <filter id="hl-rough" x="-8%" y="-300%" width="116%" height="700%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018 0.08" numOctaves="4" seed="5" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>
  </body>
</html>
