- text: Harika işler yapmanın tek yolu, yaptığın işi sevmektir.
  author: Steve Jobs

- text: Ne kadar yavaş gittiğin önemli değil, durmadığın sürece.
  author: Konfüçyüs

- text: Liman güvenlidir ama gemiler liman için yapılmamıştır.

- text: Başarı, her gün tekrarlanan küçük çabaların toplamıdır.
  author: Robert Collier

- text: Hayal edebiliyorsan, yapabilirsin.
  author: Walt Disney

- text: Zorluklar seni kırmaz; ya güçlendirir ya da asıl kim olduğunu ortaya çıkarır.

- text: Başarı bir kapı değil, yürüdüğün bir yoldur.

- text: Vazgeçmek de bir karardır — ama ilerlemeyi seçmek seni tanımlar.

- text: Düşüncelerine dikkat et, çünkü onlar kelimelerine dönüşür.
  author: Lao Tzu

- text: En büyük zafer, hiç düşmemek değil; her düşüşte yeniden kalkmaktır.
  author: Konfüçyüs

- text: Kendine inanmak, yarı yoldur.

- text: Mükemmel an diye bir şey yoktur — harekete geçmek için en doğru an şu andır.

- text: Bir şeyin imkânsız göründüğü an, onu başarmanın tam zamanıdır.
  author: Nelson Mandela

- text: Korkuların seni yönlendirmesin; ama nelerden korktuğuna dikkat et — orası büyüyebileceğin yerdir.

- text: Sabır acıdır, ama meyvesi tatlıdır.
  author: Jean-Jacques Rousseau

- text: Başkalarının ne düşündüğü konusunda endişelenmeyi bıraktığında, kim olduğunu keşfedersin.

- text: Bir ağaç dikmek için en iyi zaman yirmi yıl önceydi. İkinci en iyi zaman şimdi.

- text: Deha, sabır kılığına girmiş yetenektir.
  author: Buffon

- text: Rüzgar gülü hareket ettirir ama kökü sarsarsın diye düşünmez.

- text: Başarılı insanlar fırsatlar arar; başarısız insanlar ise beklentiler.

- text: Her gün biraz daha iyi olmaya çalışmak, zamanla mucize yaratır.

- text: Hatalarından ders çıkar ama onlarla birlikte yaşama.

- text: Hangi yöne gittiğini bilmiyorsan, her yol seni oraya götürür.
  author: Lewis Carroll

- text: Güçlü olmak zorunda değilsin — sadece pes etmemeyi seçmek yeterlidir.

- text: Bir gün değil, bugün.

- text: Hayat bisiklete binmek gibidir — dengeyi korumak için ilerlemeye devam etmelisin.
  author: Albert Einstein

- text: Cesaret, korkunun yokluğu değil; başka bir şeyin daha önemli olduğuna karar vermektir.
  author: Ambrose Redmoon

- text: Potansiyelini görmek için bazen başkasının gözlerine ihtiyaç duyarsın.

- text: Yola çıkmak, varış noktasının yarısıdır.

- text: Zaman geçmez — sen geçersin. Onu nasıl kullandığın, kim olduğunu gösterir.

- text: Küçük adımlar büyük mesafeler kat eder — eğer bırakmazsan.

- text: Başarmanın sırrı başlamaktır.
  author: Mark Twain

- text: Kendi sesine güven; çünkü o ses seni en iyi tanıyandır.

- text: Dağın zirvesinden değil, tırmanırken öğrenirsin.

- text: Kimse harakiri yapacak kadar japon değildir.
  author: Fatih Terim
